<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bars</title>
</head>
<style>
   #g{
    color: white;
    background-color: green;
    padding: 10px;
    max-width: 50px;
    text-decoration: none;
    border: 2px, solid, black;
   }
   #b{
    color: white;
    background-color: blue;
    padding: 10px;
    max-width: 50px;
    text-decoration: none;
    border: 2px, solid, black;
   }
   #r{
    color: white;
    background-color: red;
    padding: 10px;
    max-width: 50px;
    text-decoration: none;
    border: 2px, solid, black;
   }
   #gr{
    color: white;
    background-color: gray;
    padding: 10px;
    max-width: 50px;
    text-decoration: none;
    border: 2px, solid, black;
   }
   #bk{
    color: white;
    background-color: black;
    padding: 10px;
    max-width: 50px;
    text-decoration: none;
    border: 2px, solid, black;
   }
   #g:hover{
    color: white;
    background-color: black;
   }
    #b:hover{
    color: white;
    background-color: black;
   }
    #r:hover{
    color: white;
    background-color: black;
   }
    #gr:hover{
    color: white;
    background-color: black;
   }
    #bk:hover{
    color: white;
    background-color: black;
   }
   #g:active{
    background-color: yellow;
    color: black;
    border-color: blue;
   }
    #b:active{
    background-color: yellow;
    color: black;
    border-color: blue;
   }
    #r:active{
    background-color: yellow;
    color: black;
    border-color: blue;
   }
    #gr:active{
    background-color: yellow;
    color: black;
    border-color: blue;
   }
    #bk:active{
    background-color: yellow;
    color: black;
    border-color: blue;
   }
</style>
<body>
    <ul type="none">
        <a href="#" id="g">Green</a>
        <a href="#" id="b">Blue</a>
        <a href="#" id="r">Red</a>
        <a href="#" id="gr">Gray</a>
        <a href="#" id="bk">Black</a>
    </ul>
</body>
</html>
