<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        margin-top: 100px;
    }
    div{
        margin: 10px;
        padding: 0px;
    }
    .div1{
        display: flex;
    }
    .image-box{
        width: 250px;
        height: 160px;
        box-shadow: 0 0 10px;
        transition: transform 0.65s ease;
    }
    img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .image-box:hover{
        transform: scale(1.15);
    }
</style>
<body>
    <div class="div1">
    <div class="image-box">
        <img src="camera.jpg"></img>
    </div>
    <div class="image-box">
        <img src="camera2.jpeg"></img>
    </div>
    <div class="image-box">
        <img src="camera3.jpg"></img>
    </div>
    <div class="image-box">
        <img src="camera4.jpg"></img>
    </div>
    </div>
</body>
</html>
